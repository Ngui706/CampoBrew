<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
    
    <title>Shop Our Coffee | TechSips</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: { light: '#F5EBE0', DEFAULT: '#D5BDAF', medium: '#C38E70', dark: '#3A2618' }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* Optional: Smooth transition for category buttons */
        .cat-btn { transition: all 0.3s ease; }
        #mobile-menu.active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-coffee-light font-sans text-coffee-dark">

    <nav class="bg-white shadow-md sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold font-serif text-coffee-dark flex items-center">
                <i class="fa-solid fa-mug-hot text-coffee-medium mr-2"></i>TechSips
            </a>
            
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="hover:text-coffee-medium transition">Home</a>
                <a href="products.html" class="text-coffee-medium font-bold border-b-2 border-coffee-medium">Shop</a>
                <a href="checkout.html" class="relative group">
                    <i class="fa-solid fa-cart-shopping text-xl transition-colors group-hover:text-coffee-medium"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-coffee-medium text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">0</span>
                </a>
            </div>

            <button class="nav-toggle md:hidden text-2xl text-coffee-dark">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t mt-4 p-4 space-y-4 shadow-inner">
            <a href="index.html" class="block hover:text-coffee-medium">Home</a>
            <a href="products.html" class="block text-coffee-medium font-bold">Shop</a>
            <a href="checkout.html" class="block hover:text-coffee-medium">Cart</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <h1 class="text-3xl font-serif font-bold">Discover Our Roasts</h1>
            
            <div class="relative w-full md:w-80">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="search-input" 
                       placeholder="Search name or category..." 
                       class="w-full pl-10 pr-4 py-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-coffee-medium outline-none transition shadow-sm">
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <aside class="w-full md:w-64 space-y-8">
                <div>
                    <h3 class="font-bold uppercase text-xs tracking-widest text-gray-500 mb-4">Categories</h3>
                    <div class="flex flex-wrap md:flex-col gap-2">
                        <button onclick="filterByCategory('all')" class="cat-btn bg-coffee-dark text-white px-4 py-2.5 rounded-lg text-left text-sm font-medium shadow-sm">
                            All Products
                        </button>
                        <button onclick="filterByCategory('plain Coffee')" class="cat-btn bg-white text-gray-600 hover:bg-coffee-light px-4 py-2.5 rounded-lg text-left text-sm font-medium border border-gray-100 shadow-sm">
                            Plain Coffee
                        </button>
                        <button onclick="filterByCategory('ginger')" class="cat-btn bg-white text-gray-600 hover:bg-coffee-light px-4 py-2.5 rounded-lg text-left text-sm font-medium border border-gray-100 shadow-sm">
                            Ginger Coffee
                        </button>
                        <button onclick="filterByCategory('lemon Coffee')" class="cat-btn bg-white text-gray-600 hover:bg-coffee-light px-4 py-2.5 rounded-lg text-left text-sm font-medium border border-gray-100 shadow-sm">
                            Lemon Coffee
                        </button>
                        <button onclick="filterByCategory('merchandise')" class="cat-btn bg-white text-gray-600 hover:bg-coffee-light px-4 py-2.5 rounded-lg text-left text-sm font-medium border border-gray-100 shadow-sm">
                            Merchandise
                        </button>
                    </div>
                </div>

                <div class="bg-coffee-dark p-6 rounded-2xl text-white hidden md:block">
                    <p class="text-xs uppercase tracking-tighter opacity-70 mb-2">Brewing Tip</p>
                    <p class="text-sm font-medium leading-relaxed italic">"The best coffee is the one you enjoy drinking."</p>
                </div>
            </aside>

            <div id="product-grid" class="flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="col-span-full flex flex-col items-center justify-center py-20 opacity-50">
                    <i class="fa-solid fa-spinner fa-spin text-3xl mb-4"></i>
                    <p>Loading your coffee menu...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t mt-20 py-10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400 text-sm">© 2026 TechSips Coffee Shop. Served with ❤️ at Karatina University.</p>
            <div class="mt-4">
                <a href="admin.html" class="text-[10px] text-gray-300 hover:text-coffee-medium uppercase tracking-widest transition">Staff Portal</a>
            </div>
        </div>
    </footer>

    <script src="product.js"></script>    
</body>
</html>
