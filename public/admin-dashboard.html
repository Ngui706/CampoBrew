<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    
    <title>Management | TechSips</title>    
</head>
<body class="bg-gray-100 font-sans flex min-h-screen">

    <aside class="w-64 bg-[#3A2618] text-white fixed h-full transition-all duration-300">
        <div class="p-6">
            <h1 class="text-2xl font-bold font-serif border-b border-gray-600 pb-4">TechSips Admin</h1>
        </div>
        <nav class="mt-6 px-4 space-y-2">
            <button onclick="switchSection('products')" class="nav-link w-full flex items-center p-3 rounded-lg hover:bg-[#C38E70] transition">
                <i class="fa-solid fa-mug-hot w-8"></i> Products
            </button>
            <button onclick="switchSection('blogs')" class="nav-link w-full flex items-center p-3 rounded-lg hover:bg-[#C38E70] transition">
                <i class="fa-solid fa-newspaper w-8"></i> Blogs
            </button>
            <button onclick="switchSection('ads')" class="nav-link w-full flex items-center p-3 rounded-lg hover:bg-[#C38E70] transition">
                <i class="fa-solid fa-bullhorn w-8"></i> Ads
            </button>
            <button onclick="switchSection('reviews')" class="nav-link w-full flex items-center p-3 rounded-lg hover:bg-[#C38E70] transition">
                <i class="fa-solid fa-star w-8"></i> Reviews
            </button>
            <button onclick="switchSection('orders')" class="nav-link w-full flex items-center p-3 rounded-lg hover:bg-[#C38E70] transition">
    <i class="fa-solid fa-receipt w-8"></i> Orders 
</button>

<button onclick="switchSection('dashboard')" class="nav-link w-full flex items-center p-3 rounded-lg bg-[#C38E70] text-white transition">
    <i class="fa-solid fa-chart-line w-8"></i> Overview
</button>
            <div class="pt-10">
                <button onclick="logout()" class="w-full flex items-center p-3 text-red-400 hover:bg-red-900/30 rounded-lg transition">
                    <i class="fa-solid fa-power-off w-8"></i> Logout
                </button>
            </div>
        </nav>
    </aside>

    <main class="ml-64 flex-1 p-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 id="current-title" class="text-3xl font-bold text-gray-800 uppercase tracking-tight">Products</h2>
                <p class="text-gray-500">Manage your coffee shop data and content.</p>
            </div>
            <button id="add-btn" onclick="openModal()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg flex items-center gap-2 transition">
                <i class="fa-solid fa-plus"></i> Add New
            </button>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead id="table-head" class="bg-gray-50 border-b border-gray-200">
                    </thead>
                <tbody id="table-body" class="divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 id="modal-title" class="text-xl font-bold text-gray-800">Add New Product</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <form id="modal-form" class="p-8 grid grid-cols-2 gap-6">
                </form>
            <div class="p-6 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-6 py-2 text-gray-600 font-medium hover:text-gray-800">Cancel</button>
                <button id="save-btn" onclick="handleFormSubmit(event)" class="bg-green-600 hover:bg-green-700 text-white px-8 py-2 rounded-lg font-bold shadow-md transition">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"> </script>
</body>
</html>
